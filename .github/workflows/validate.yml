name: Validate shared workflows

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  contract:
    # break-glass: swap runs-on back to ubuntu-24.04 if self-hosted fleet unavailable
    runs-on: [self-hosted, Linux, X64]
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: '24'

      - name: Reusable CI gate contract
        run: node --test .github/scripts/test-ci-gate.mjs .github/scripts/test-self-hosted-runners.mjs
