name: CI Gate (Reusable)

on:
  workflow_call:
    inputs:
      node-version:
        type: string
        default: '24'
      check-command:
        type: string
        default: 'pnpm run ci:local'
      cf-worker-name:
        type: string
        default: ''
        description: 'Optional. CF Worker script name. If set together with cf-account-id and the CF_BUILDS_TOKEN secret, the gate manually triggers a CF Build after passing on main/staging — bypasses CF Builds webhook dispatch latency.'
      cf-account-id:
        type: string
        default: ''
        description: 'Optional. CF account ID owning the worker (e.g. b8fd8daf73edd8fe6b6bd18eeaacf2bb for fulcrum).'
    secrets:
      CF_BUILDS_TOKEN:
        required: false
        description: 'Optional user-scoped (cfut_*) Cloudflare API token with Workers Builds Configuration: Edit + Workers Scripts: Read permissions.'

permissions:
  contents: read

# Workflow-level so cancellations render as "cancelled" (gray) instead of
# leaving a job-cancelled-mid-flight "failed" (red) run. Cancellations are
# common on close+reopen, which is the workaround for slow first-webhook
# delivery from Cloudflare Builds.
concurrency:
  group: ci-gate-${{ github.repository }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Resolve pnpm version
        id: pnpm-version
        run: |
          python3 - <<'PY' >> "$GITHUB_OUTPUT"
          import json
          from pathlib import Path

          version = "10.28.0"
          package_json = Path("package.json")
          if package_json.exists():
            data = json.loads(package_json.read_text())
            package_manager = data.get("packageManager")
            if isinstance(package_manager, str) and package_manager.startswith("pnpm@"):
              version = package_manager.split("@", 1)[1]
            else:
              volta = data.get("volta")
              if isinstance(volta, dict):
                volta_pnpm = volta.get("pnpm")
                if isinstance(volta_pnpm, str) and volta_pnpm:
                  version = volta_pnpm

          print(f"version={version}")
          PY

      - uses: pnpm/action-setup@v4
        with:
          version: ${{ steps.pnpm-version.outputs.version }}

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ inputs.node-version }}
          cache: 'pnpm'

      - run: pnpm install --frozen-lockfile

      - name: CI gate (typecheck + lint + test + build)
        run: ${{ inputs.check-command }}

      - name: Lockfile integrity
        run: |
          if [ ! -f pnpm-lock.yaml ]; then
            echo "::error::pnpm-lock.yaml missing"
            exit 1
          fi
          if [ -f package-lock.json ]; then
            echo "::error::package-lock.json found — use pnpm only"
            exit 1
          fi
          if [ -f yarn.lock ]; then
            echo "::error::yarn.lock found — use pnpm only"
            exit 1
          fi

      # pnpm audit removed 2026-05-13. Grype (below) covers the same
      # vulnerability surface using the OSV/NVD feeds and supports per-repo
      # allowlisting via .grype.yaml. pnpm audit lacks any allowlist mechanism
      # and was blocking PRs on transitive CVEs (e.g. basic-ftp via
      # @cloudflare/puppeteer) that the team had no near-term fix for.

      - name: Accessibility (axe-core)
        run: |
          if grep -q '"test:a11y"' package.json 2>/dev/null; then
            pnpm run test:a11y
          else
            echo "::notice::No test:a11y script — skipping"
          fi

      - name: Performance (Lighthouse)
        continue-on-error: true
        run: |
          if grep -q '"test:perf"' package.json 2>/dev/null; then
            pnpm run test:perf
          else
            echo "::notice::No test:perf script — skipping"
          fi

      - name: Dead code (Knip)
        continue-on-error: true
        run: |
          if grep -q '"knip"' package.json 2>/dev/null; then
            pnpm exec knip
          else
            echo "::notice::Knip not configured — skipping"
          fi

  gitleaks:
    runs-on: ubuntu-24.04
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install gitleaks
        run: |
          curl -sSL -o /tmp/gitleaks.tar.gz \
            https://github.com/gitleaks/gitleaks/releases/download/v8.21.2/gitleaks_8.21.2_linux_x64.tar.gz
          tar -xzf /tmp/gitleaks.tar.gz -C /tmp
          sudo mv /tmp/gitleaks /usr/local/bin/gitleaks

      - name: Gitleaks scan
        run: gitleaks detect --source . --no-banner --redact

  semgrep:
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    container:
      image: returntocorp/semgrep:latest
    steps:
      - uses: actions/checkout@v4

      - name: Semgrep scan
        run: |
          semgrep scan \
            --config=p/security-audit \
            --config=p/owasp-top-ten \
            --config=p/typescript \
            --error \
            --severity=ERROR \
            --quiet

  grype:
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - name: Cache Grype vulnerability database
        uses: actions/cache@v4
        with:
          path: ~/.cache/grype/db
          key: grype-db-${{ hashFiles('.github/workflows/ci-gate.yml') }}
          restore-keys: |
            grype-db-

      - name: Grype vulnerability scan
        uses: anchore/scan-action@v6
        with:
          path: '.'
          fail-build: true
          severity-cutoff: high

  trigger-cf-build:
    # Optional: after the gate passes, POST to the Workers Builds manual-trigger
    # endpoint to start the build immediately instead of waiting for CF Builds'
    # webhook dispatch. Skipped if cf-worker-name / cf-account-id / CF_BUILDS_TOKEN
    # aren't provided, and only runs on push to main or staging.
    if: |
      github.event_name == 'push' &&
      (github.ref_name == 'main' || github.ref_name == 'staging') &&
      inputs.cf-worker-name != '' &&
      inputs.cf-account-id != ''
    needs: [quality, gitleaks, semgrep, grype]
    runs-on: ubuntu-24.04
    timeout-minutes: 3
    steps:
      - name: Manually trigger Cloudflare Workers build
        env:
          CF_TOKEN: ${{ secrets.CF_BUILDS_TOKEN }}
          ACCOUNT_ID: ${{ inputs.cf-account-id }}
          WORKER_NAME: ${{ inputs.cf-worker-name }}
          BRANCH: ${{ github.ref_name }}
        run: |
          set -euo pipefail
          if [ -z "${CF_TOKEN:-}" ]; then
            echo "::warning::CF_BUILDS_TOKEN secret not provided — skipping manual trigger; CF will deploy via webhook (slower)."
            exit 0
          fi

          API="https://api.cloudflare.com/client/v4"
          AUTH="Authorization: Bearer $CF_TOKEN"

          worker_tag=$(curl -fsSL -H "$AUTH" "$API/accounts/$ACCOUNT_ID/workers/scripts/$WORKER_NAME" \
            | jq -r '.result.tag // empty')
          if [ -z "$worker_tag" ]; then
            echo "::warning::Could not resolve worker tag for '$WORKER_NAME' in account $ACCOUNT_ID — skipping manual trigger."
            exit 0
          fi

          trigger_uuid=$(curl -fsSL -H "$AUTH" "$API/accounts/$ACCOUNT_ID/builds/workers/$worker_tag/triggers" \
            | jq -r --arg branch "$BRANCH" '[.result[] | select(.branch_includes | index($branch))] | first | .trigger_uuid // empty')
          if [ -z "$trigger_uuid" ]; then
            echo "::warning::No CF Builds trigger matches branch '$BRANCH' for worker '$WORKER_NAME' — skipping manual trigger."
            exit 0
          fi

          echo "Triggering CF Build for worker '$WORKER_NAME' on branch '$BRANCH' (trigger $trigger_uuid)"
          response=$(curl -fsSL -X POST -H "$AUTH" "$API/accounts/$ACCOUNT_ID/builds/triggers/$trigger_uuid/builds")
          if ! echo "$response" | jq -e '.success == true' > /dev/null; then
            echo "::error::CF Builds API rejected the trigger:"
            echo "$response" | jq '.errors // .'
            exit 1
          fi

          build_uuid=$(echo "$response" | jq -r '.result.build_uuid // .result.uuid // "unknown"')
          echo "::notice::CF Build started: $build_uuid"
