name: CI Gate (Reusable)

on:
  workflow_call:
    inputs:
      node-version:
        type: string
        default: '24'
      check-command:
        type: string
        default: 'pnpm run ci:local'
      docs-lint-enabled:
        type: boolean
        default: false
        description: 'Optional. Run the docs-convention lint job (@fulcrum-labs/docs-lint). Repos opt in via platform-foundations maintenance.docs_lint.'
      turbo-cache-enabled:
        type: boolean
        default: false
        description: 'Optional. Enable the signed Turbo remote cache for trusted callers. Fork pull requests remain uncached.'
      turbo-cache-api:
        type: string
        default: ''
        description: 'Optional. Turbo-compatible remote cache API URL.'
      turbo-cache-team:
        type: string
        default: ''
        description: 'Optional. Namespace used to isolate this repository family in the shared cache.'
      cf-worker-name:
        type: string
        default: ''
        description: 'Optional. CF Worker script name. If set together with cf-account-id and the CF_BUILDS_TOKEN secret, the gate manually triggers a CF Build after passing on main/staging — bypasses CF Builds webhook dispatch latency.'
      cf-account-id:
        type: string
        default: ''
        description: 'Optional. CF account ID owning the worker (e.g. b8fd8daf73edd8fe6b6bd18eeaacf2bb for fulcrum).'
    secrets:
      CF_BUILDS_TOKEN:
        required: false
        description: 'Optional user-scoped (cfut_*) Cloudflare API token with Workers Builds Configuration: Edit + Workers Scripts: Read permissions.'
      TURBO_CACHE_TOKEN:
        required: false
        description: 'Optional bearer credential for the signed Turbo remote cache.'
      TURBO_CACHE_SIGNATURE_KEY:
        required: false
        description: 'Optional HMAC key used to sign and verify Turbo cache artifacts.'

permissions:
  contents: read

# Workflow-level so cancellations render as "cancelled" (gray) instead of
# leaving a job-cancelled-mid-flight "failed" (red) run. Cancellations are
# common on close+reopen, which is the workaround for slow first-webhook
# delivery from Cloudflare Builds.
concurrency:
  group: ci-gate-${{ github.repository }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    runs-on: [self-hosted, Linux, X64]
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Resolve pnpm version
        id: pnpm-version
        run: |
          python3 - <<'PY' >> "$GITHUB_OUTPUT"
          import json
          from pathlib import Path

          version = "10.28.0"
          package_json = Path("package.json")
          if package_json.exists():
            data = json.loads(package_json.read_text())
            package_manager = data.get("packageManager")
            if isinstance(package_manager, str) and package_manager.startswith("pnpm@"):
              version = package_manager.split("@", 1)[1]
            else:
              volta = data.get("volta")
              if isinstance(volta, dict):
                volta_pnpm = volta.get("pnpm")
                if isinstance(volta_pnpm, str) and volta_pnpm:
                  version = volta_pnpm

          print(f"version={version}")
          PY

      - uses: pnpm/action-setup@v6.0.8
        with:
          version: ${{ steps.pnpm-version.outputs.version }}
          dest: ${{ runner.temp }}/setup-pnpm

      - name: Guard pnpm runner isolation
        run: |
          case "${PNPM_HOME:-}" in
            "$RUNNER_TEMP"/*) ;;
            *)
              echo "::error::PNPM_HOME must be under RUNNER_TEMP on self-hosted runners; got '${PNPM_HOME:-<unset>}'"
              exit 1
              ;;
          esac

          if [ -e "$HOME/setup-pnpm" ]; then
            echo "::warning::Removing stale home-level pnpm setup from prior self-hosted jobs"
            rm -rf "$HOME/setup-pnpm"
          fi

      - uses: actions/setup-node@v5
        with:
          node-version: ${{ inputs.node-version }}
          cache: 'pnpm'

      - run: pnpm install --frozen-lockfile

      - name: Resolve Turbo cache eligibility
        id: turbo-cache
        env:
          TURBO_CACHE_ENABLED: ${{ inputs.turbo-cache-enabled }}
          HEAD_REPO: ${{ github.event.pull_request.head.repo.full_name }}
        run: |
          # Credentials are only ever injected for an explicit event allowlist:
          # push, merge_group, and same-repository pull_request. Every other
          # event (fork PRs, pull_request_target, issue_comment, workflow_run,
          # ...) gets an empty credential set and Turbo stays on its local
          # cache.
          eligible=false
          if [ "$TURBO_CACHE_ENABLED" = "true" ]; then
            case "$GITHUB_EVENT_NAME" in
              push|merge_group)
                eligible=true
                ;;
              pull_request)
                if [ -n "$HEAD_REPO" ] && [ "$HEAD_REPO" = "$GITHUB_REPOSITORY" ]; then
                  eligible=true
                fi
                ;;
            esac
          fi
          echo "eligible=$eligible" >> "$GITHUB_OUTPUT"

      - name: Enforce signed-cache consumer contract
        if: ${{ steps.turbo-cache.outputs.eligible == 'true' }}
        run: |
          # Fail closed: never inject cache credentials into a consumer that
          # does not verify artifact signatures (remoteCache.signature).
          node - <<'JS'
          const fs = require('node:fs');
          let config;
          try {
            config = JSON.parse(fs.readFileSync('turbo.json', 'utf8'));
          } catch (error) {
            console.error('::error::turbo-cache-enabled requires a readable turbo.json: ' + error.message);
            process.exit(1);
          }
          if (config?.remoteCache?.signature !== true) {
            console.error('::error::turbo-cache-enabled requires remoteCache.signature=true in turbo.json');
            process.exit(1);
          }
          JS

      - name: CI gate (typecheck + lint + test + build)
        run: ${{ inputs.check-command }}
        env:
          # Cache credentials are injected only when the eligibility step above
          # matched the trusted-event allowlist. Empty credentials leave Turbo
          # on its local cache and keep the gate fail-open when a caller has
          # not provisioned the cache yet.
          TURBO_API: ${{ steps.turbo-cache.outputs.eligible == 'true' && inputs.turbo-cache-api || '' }}
          TURBO_TOKEN: ${{ steps.turbo-cache.outputs.eligible == 'true' && secrets.TURBO_CACHE_TOKEN || '' }}
          TURBO_TEAM: ${{ steps.turbo-cache.outputs.eligible == 'true' && inputs.turbo-cache-team || '' }}
          TURBO_TEAMID: ${{ steps.turbo-cache.outputs.eligible == 'true' && inputs.turbo-cache-team || '' }}
          TURBO_REMOTE_CACHE_SIGNATURE_KEY: ${{ steps.turbo-cache.outputs.eligible == 'true' && secrets.TURBO_CACHE_SIGNATURE_KEY || '' }}
          TURBO_REMOTE_CACHE_TIMEOUT: '10'
          TURBO_REMOTE_CACHE_UPLOAD_TIMEOUT: '10'

      - name: Lockfile integrity
        run: |
          if [ ! -f pnpm-lock.yaml ]; then
            echo "::error::pnpm-lock.yaml missing"
            exit 1
          fi
          if [ -f package-lock.json ]; then
            echo "::error::package-lock.json found — use pnpm only"
            exit 1
          fi
          if [ -f yarn.lock ]; then
            echo "::error::yarn.lock found — use pnpm only"
            exit 1
          fi

      # pnpm audit removed 2026-05-13. Grype (below) covers the same
      # vulnerability surface using the OSV/NVD feeds and supports per-repo
      # allowlisting via .grype.yaml. pnpm audit lacks any allowlist mechanism
      # and was blocking PRs on transitive CVEs (e.g. basic-ftp via
      # @cloudflare/puppeteer) that the team had no near-term fix for.

      - name: Accessibility (axe-core)
        run: |
          if grep -q '"test:a11y"' package.json 2>/dev/null; then
            pnpm run test:a11y
          else
            echo "::notice::No test:a11y script — skipping"
          fi

      - name: Performance (Lighthouse)
        continue-on-error: true
        run: |
          if grep -q '"test:perf"' package.json 2>/dev/null; then
            pnpm run test:perf
          else
            echo "::notice::No test:perf script — skipping"
          fi

      - name: Dead code (Knip)
        continue-on-error: true
        run: |
          if grep -q '"knip"' package.json 2>/dev/null; then
            pnpm exec knip
          else
            echo "::notice::Knip not configured — skipping"
          fi

  docs-lint:
    if: ${{ inputs.docs-lint-enabled }}
    # break-glass: swap runs-on back to ubuntu-24.04 if self-hosted fleet unavailable
    runs-on: [self-hosted, Linux, X64]
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v5

      - name: Resolve pnpm version
        id: pnpm-version
        run: |
          python3 - <<'PY' >> "$GITHUB_OUTPUT"
          import json
          from pathlib import Path

          version = "10.28.0"
          package_json = Path("package.json")
          if package_json.exists():
            data = json.loads(package_json.read_text())
            package_manager = data.get("packageManager")
            if isinstance(package_manager, str) and package_manager.startswith("pnpm@"):
              version = package_manager.split("@", 1)[1]
            else:
              volta = data.get("volta")
              if isinstance(volta, dict):
                volta_pnpm = volta.get("pnpm")
                if isinstance(volta_pnpm, str) and volta_pnpm:
                  version = volta_pnpm

          print(f"version={version}")
          PY

      - uses: pnpm/action-setup@v6.0.8
        with:
          version: ${{ steps.pnpm-version.outputs.version }}
          dest: ${{ runner.temp }}/setup-pnpm

      - name: Guard pnpm runner isolation
        run: |
          case "${PNPM_HOME:-}" in
            "$RUNNER_TEMP"/*) ;;
            *)
              echo "::error::PNPM_HOME must be under RUNNER_TEMP on self-hosted runners; got '${PNPM_HOME:-<unset>}'"
              exit 1
              ;;
          esac

          if [ -e "$HOME/setup-pnpm" ]; then
            echo "::warning::Removing stale home-level pnpm setup from prior self-hosted jobs"
            rm -rf "$HOME/setup-pnpm"
          fi

      - uses: actions/setup-node@v5
        with:
          node-version: ${{ inputs.node-version }}
          cache: 'pnpm'

      - run: pnpm install --frozen-lockfile

      - name: Docs convention lint
        run: |
          if grep -q '"docs-lint"' package.json 2>/dev/null; then
            pnpm run docs-lint -- --json
          else
            pnpm dlx @fulcrum-labs/docs-lint@latest --json
          fi

  gitleaks:
    # break-glass: swap runs-on back to ubuntu-24.04 if self-hosted fleet unavailable
    runs-on: [self-hosted, Linux, X64]
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Install gitleaks
        run: |
          curl -sSL -o /tmp/gitleaks.tar.gz \
            https://github.com/gitleaks/gitleaks/releases/download/v8.21.2/gitleaks_8.21.2_linux_x64.tar.gz
          tar -xzf /tmp/gitleaks.tar.gz -C /tmp
          mv /tmp/gitleaks "$RUNNER_TEMP/gitleaks"
          echo "$RUNNER_TEMP" >> "$GITHUB_PATH"

      - name: Gitleaks scan
        run: gitleaks detect --source . --no-banner --redact

  semgrep:
    # break-glass: swap runs-on back to ubuntu-24.04 if self-hosted fleet unavailable
    # S10/D3: pip installation removes the runner's Docker dependency. Keep the
    # user base in RUNNER_TEMP so self-hosted jobs cannot leak packages across runs.
    runs-on: [self-hosted, Linux, X64]
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v5

      - name: Install semgrep
        run: |
          # Both runner fleets use PEP 668 externally-managed Python. --user
          # confines the pinned package to the ephemeral PYTHONUSERBASE.
          PYTHONUSERBASE="$RUNNER_TEMP/semgrep-user" \
            python3 -m pip install --user --break-system-packages --quiet semgrep==1.170.0
          echo "$RUNNER_TEMP/semgrep-user/bin" >> "$GITHUB_PATH"

      - name: Semgrep scan
        run: |
          semgrep scan \
            --config=p/security-audit \
            --config=p/owasp-top-ten \
            --config=p/typescript \
            --error \
            --severity=ERROR \
            --quiet

  grype:
    # break-glass: swap runs-on back to ubuntu-24.04 if self-hosted fleet unavailable
    # anchore/scan-action@v7.4.0 runs 'grype dir:.' (binary download, no Docker required)
    runs-on: [self-hosted, Linux, X64]
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v5

      - name: Cache Grype vulnerability database
        uses: actions/cache@v5
        with:
          path: ~/.cache/grype/db
          key: grype-db-${{ hashFiles('.github/workflows/ci-gate.yml') }}
          restore-keys: |
            grype-db-

      - name: Grype vulnerability scan
        uses: anchore/scan-action@v7.4.0
        with:
          path: '.'
          fail-build: true
          severity-cutoff: high

  trigger-cf-build:
    # Optional: after the gate passes, POST to the Workers Builds manual-trigger
    # endpoint to start the build immediately instead of waiting for CF Builds'
    # webhook dispatch. Skipped if cf-worker-name / cf-account-id / CF_BUILDS_TOKEN
    # aren't provided, and only runs on push to main or staging.
    if: |
      github.event_name == 'push' &&
      (github.ref_name == 'main' || github.ref_name == 'staging') &&
      inputs.cf-worker-name != '' &&
      inputs.cf-account-id != ''
    needs: [quality, gitleaks, semgrep, grype]
    runs-on: ubuntu-24.04
    timeout-minutes: 3
    steps:
      - name: Manually trigger Cloudflare Workers build
        env:
          CF_TOKEN: ${{ secrets.CF_BUILDS_TOKEN }}
          ACCOUNT_ID: ${{ inputs.cf-account-id }}
          WORKER_NAME: ${{ inputs.cf-worker-name }}
          BRANCH: ${{ github.ref_name }}
        run: |
          set -euo pipefail
          if [ -z "${CF_TOKEN:-}" ]; then
            echo "::warning::CF_BUILDS_TOKEN secret not provided — skipping manual trigger; CF will deploy via webhook (slower)."
            exit 0
          fi

          API="https://api.cloudflare.com/client/v4"
          AUTH="Authorization: Bearer $CF_TOKEN"

          worker_tag=$(curl -fsSL -H "$AUTH" "$API/accounts/$ACCOUNT_ID/workers/scripts/$WORKER_NAME" \
            | jq -r '.result.tag // empty')
          if [ -z "$worker_tag" ]; then
            echo "::warning::Could not resolve worker tag for '$WORKER_NAME' in account $ACCOUNT_ID — skipping manual trigger."
            exit 0
          fi

          trigger_uuid=$(curl -fsSL -H "$AUTH" "$API/accounts/$ACCOUNT_ID/builds/workers/$worker_tag/triggers" \
            | jq -r --arg branch "$BRANCH" '[.result[] | select(.branch_includes | index($branch))] | first | .trigger_uuid // empty')
          if [ -z "$trigger_uuid" ]; then
            echo "::warning::No CF Builds trigger matches branch '$BRANCH' for worker '$WORKER_NAME' — skipping manual trigger."
            exit 0
          fi

          echo "Triggering CF Build for worker '$WORKER_NAME' on branch '$BRANCH' (trigger $trigger_uuid)"
          response=$(curl -fsSL -X POST -H "$AUTH" "$API/accounts/$ACCOUNT_ID/builds/triggers/$trigger_uuid/builds")
          if ! echo "$response" | jq -e '.success == true' > /dev/null; then
            echo "::error::CF Builds API rejected the trigger:"
            echo "$response" | jq '.errors // .'
            exit 1
          fi

          build_uuid=$(echo "$response" | jq -r '.result.build_uuid // .result.uuid // "unknown"')
          echo "::notice::CF Build started: $build_uuid"
